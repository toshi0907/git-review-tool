services:
  git-review-tool:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # レビュー対象のgitリポジトリをマウント（デフォルト: カレントディレクトリ）
      - "${REPO_PATH:-.}:/repo:ro"
      # SQLiteデータベースの永続化ボリューム
      - review-data:/data
    environment:
      - COMMIT=${COMMIT}
      - BASE=${BASE:-}
      - ENCODING=${ENCODING:-}

volumes:
  review-data:

version: "3"
services:
  git-review-tool:
    build: .
    ports:
      - "${GIT_REVIEW_TOOL_PORT:-5000}:5000"
    volumes:
      # レビュー対象のgitリポジトリをマウント（デフォルト: カレントディレクトリ）
      - "${GIT_REVIEW_TOOL_REPO_PATH:-.}:/repo:ro"
      # SQLiteデータベースの永続化ボリューム
      - review-data:/data
    environment:
      - GIT_REVIEW_TOOL_COMMIT=${GIT_REVIEW_TOOL_COMMIT}
      - GIT_REVIEW_TOOL_BASE
      - GIT_REVIEW_TOOL_BASE_BRANCH
      - GIT_REVIEW_TOOL_TARGET_MESSAGE_KEYWORD
      - GIT_REVIEW_TOOL_ENCODING

volumes:
  review-data:

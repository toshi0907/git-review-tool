services:
  git-review-tool:
    build: .
    ports:
      - "${GIT_REVIEW_TOOL_PORT:-5000}:5000"
    volumes:
      # レビュー対象のgitリポジトリをマウント（デフォルト: カレントディレクトリ）
      - "${GIT_REVIEW_TOOL_REPO_PATH:-.}:/repo:ro"
      # SQLiteデータベースの永続化ボリューム
      - review-data:/data
    environment:
      - GIT_REVIEW_TOOL_COMMIT=${GIT_REVIEW_TOOL_COMMIT}
      - GIT_REVIEW_TOOL_BASE=${GIT_REVIEW_TOOL_BASE:-}
      - GIT_REVIEW_TOOL_ENCODING=${GIT_REVIEW_TOOL_ENCODING:-}

volumes:
  review-data:
